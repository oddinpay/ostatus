name = "ohstatus"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-11-17"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
preview_urls = false

[assets]
binding = "ASSETS"
directory = ".svelte-kit/cloudflare"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1
